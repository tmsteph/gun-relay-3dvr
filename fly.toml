app = "gun-relay-3dvr"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[[services.ports]]
  port = 80
  handlers = ["http"]

[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[services.http_checks]]
  path = "/"
  interval = "15s"
  timeout = "2s"
  method = "get"
